<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Extension Popup</title>
<style>
  :root {
    --bg: #fdf6e3;
    --surface: #eee8d5;
    --surface2: #e2d5b8;
    --border: rgba(100,80,70,.15);
    --text: #4a3e3d;
    --muted: #7a6e6a;
    --accent: #c47335;
    --purple: #8c5a5a;
  }
  body {
    width: 320px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    margin: 0;
    padding: 16px;
  }
  .header { display: flex; align-items: center; gap: 8px; font-weight: bold; font-size: 16px; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 12px; }
  .header svg { color: var(--accent); }
  .card { background: var(--surface); padding: 14px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 12px; }
  .row { display: flex; justify-content: space-between; align-items: center; }
  .title { font-weight: 600; font-size: 14px; display: flex; align-items: center; gap: 6px;}
  .desc { font-size: 12px; color: var(--muted); margin-top: 6px; line-height: 1.4; }
  
  /* Toggle Switch */
  .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
  .switch input { opacity: 0; width: 0; height: 0; }
  .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #d2b48c; transition: .3s; border-radius: 24px; }
  .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .3s; border-radius: 50%; }
  input:checked + .slider { background-color: var(--accent); }
  input:focus + .slider { box-shadow: 0 0 1px var(--accent); }
  input:checked + .slider:before { transform: translateX(20px); }

  /* Upload */
  .upload-area { display: block; box-sizing: border-box; width: 100%; border: 2px dashed var(--accent); border-radius: 8px; padding: 24px 16px; text-align: center; cursor: pointer; background: var(--surface2); transition: all 0.2s ease; margin-top: 10px; }
  .upload-area:hover { background: rgba(196,115,53,0.1); }
  .upload-area svg { margin-bottom: 8px; color: var(--accent); opacity: 0.8; }
  .upload-area .up-text { font-size: 13px; font-weight: 600; color: var(--text); }
  .upload-area .up-sub { font-size: 11px; color: var(--muted); margin-top: 4px; }
  input[type="file"] { display: none; }
  
  #errorText { color: #cc4d4d; font-size: 12px; margin-top: 8px; display: none; text-align: center; }
</style>
</head>
<body>
  
<div class="header">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
  Image Downloader
</div>

<div class="card">
  <div class="row">
    <div class="title">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20V10"/><path d="M18 20V4"/><path d="M6 20v-4"/></svg>
      Enable Extension
    </div>
    <label class="switch">
      <input type="checkbox" id="toggleExt" checked>
      <span class="slider"></span>
    </label>
  </div>
</div>

<div class="card">
  <div class="title">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
    Process Local Image
  </div>
  
  <div class="guide-box" style="background: rgba(196,115,53,0.08); border: 1px solid rgba(196,115,53,0.2); border-radius: 6px; padding: 10px; margin-top: 10px; font-size: 11.5px; color: var(--text); line-height: 1.5;">
    <div style="font-weight: 600; color: var(--accent); margin-bottom: 6px; display: flex; align-items: center; gap: 4px;">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
      How to get Max Quality?
    </div>
    <div><b>1.</b> Download the image using Gemini's native download button.</div>
    <div style="margin: 4px 0;"><b>2.</b> Click below to upload that downloaded file.</div>
    <div><b>3.</b> The extension will auto-remove the watermark!</div>
  </div>
  
  <label class="upload-area" id="uploadLabel" style="margin-top: 12px;">
    <input type="file" id="fileInput" accept="image/png, image/jpeg, image/webp">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
    <div class="up-text">Click to choose file</div>
    <div class="up-sub">PNG, JPEG, WebP</div>
  </label>

  <div id="errorText"></div>

</div>

<div style="margin-top: 16px; text-align: center; font-size: 11.5px; color: var(--muted); padding-top: 14px; border-top: 1px dashed var(--border);">
  <div style="display: flex; justify-content: center; gap: 12px; margin-bottom: 8px;">
    <a href="mailto:dieptien290620@gmail.com" target="_blank" title="Send Feedback" style="color: var(--accent); text-decoration: none; display: flex; align-items: center; gap: 4px;">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg> Feedback
    </a>
    <span style="opacity:0.3;">|</span>
    <span style="display: flex; align-items: center; gap: 6px;">
      Donate: 
      <a href="https://buymeacoffee.com/tixuno" target="_blank" title="Buy me a coffee" style="color: var(--accent); text-decoration: none; display: flex; align-items: center;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>
      </a>
      <span style="opacity:0.3; margin: 0 2px;">|</span>
      <a href="https://paypal.me/tixuno" target="_blank" title="Donate via PayPal" style="color: var(--accent); text-decoration: none; display: flex; align-items: center; font-weight: 600;">
        PayPal
      </a>
    </span>
  </div>
  <div>
    Built by <a href="https://github.com/diepvantien" target="_blank" style="color: var(--accent); font-weight: 600; text-decoration: none;">Diep Van Tien</a>
  </div>
</div>

<script src="popup.js"></script>
</body>
</html>
